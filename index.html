<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피크마케팅 캘린더</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #fff; color: #111; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
  }
  .app {
    width: 100%; max-width: 480px; min-height: 100vh;
    display: flex; flex-direction: column; background: #fff;
  }
  header {
    padding: 12px 16px; border-bottom: 1px solid #e5e5e5;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: #fff; z-index: 50;
  }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .header-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .header-nav { display: flex; align-items: center; gap: 4px; }
  .nav-btn { background: none; border: none; cursor: pointer; font-size: 18px; color: #555; padding: 4px; line-height: 1; }
  .month-label { font-size: 14px; font-weight: 600; min-width: 72px; text-align: center; }
  .user-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    overflow: hidden; cursor: pointer; flex-shrink: 0;
    background: #f0f0f0; display: flex; align-items: center;
    justify-content: center; font-size: 14px; border: 1.5px solid #e5e5e5;
  }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

  /* Tabs */
  .tabs { display: flex; border-bottom: 1px solid #e5e5e5; background: #fff; }
  .tab {
    flex: 1; padding: 11px 4px; text-align: center;
    font-size: 12px; font-weight: 500; color: #888;
    cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .tab.active { color: #111; border-bottom-color: #111; }

  /* Calendar */
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 0 4px; }
  .weekday-label { text-align: center; font-size: 11px; font-weight: 600; color: #888; padding: 10px 0 6px; }
  .weekday-label:first-child { color: #ef4444; }
  .weekday-label:last-child { color: #3b82f6; }
  .day-cell {
    aspect-ratio: 1; display: flex; flex-direction: column;
    align-items: center; padding: 4px 2px; cursor: pointer;
    border-radius: 8px; transition: background 0.1s; position: relative;
  }
  .day-cell:hover { background: #f5f5f5; }
  .day-cell.other-month .day-num { color: #ccc; }
  .day-cell.today .day-num {
    background: #111; color: #fff !important;
    border-radius: 50%; width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
  }
  .day-cell.selected { background: #f0f0f0; }
  .day-num { font-size: 13px; font-weight: 500; line-height: 24px; width: 24px; height: 24px; text-align: center; }
  .day-cell.sun .day-num { color: #ef4444; }
  .day-cell.sat .day-num { color: #3b82f6; }
  .event-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; margin-top: 2px; }
  .event-dot { width: 5px; height: 5px; border-radius: 50%; }

  /* Day detail */
  .day-detail { border-top: 1px solid #e5e5e5; padding: 12px 16px; flex: 1; overflow-y: auto; }
  .day-detail-title { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 8px; }
  .no-events { font-size: 13px; color: #aaa; text-align: center; padding: 20px 0; }

  /* Event items */
  .event-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
  .event-item:last-child { border-bottom: none; }
  .event-color-bar { width: 3px; border-radius: 2px; align-self: stretch; min-height: 20px; flex-shrink: 0; }
  .event-body { flex: 1; min-width: 0; }
  .event-title { font-size: 14px; font-weight: 500; word-break: break-word; }
  .event-time { font-size: 11px; color: #888; margin-top: 2px; }
  .event-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .icon-btn { background: none; border: none; cursor: pointer; font-size: 14px; color: #aaa; padding: 2px; }
  .icon-btn:hover { color: #555; }
  .team-badge {
    display: inline-block; padding: 1px 6px; border-radius: 8px;
    font-size: 9px; font-weight: 700; background: #EFF6FF; color: #3B82F6;
    margin-left: 5px; vertical-align: middle; border: 1px solid #BFDBFE;
  }
  .owner-label { font-size: 11px; color: #888; margin-top: 2px; }

  /* Todo styles */
  .todo-checkbox {
    width: 18px; height: 18px; border-radius: 4px; border: 2px solid #ccc;
    cursor: pointer; flex-shrink: 0; margin-top: 2px; background: #fff;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .todo-checkbox.done { background: #10B981; border-color: #10B981; }
  .todo-checkbox.done::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }
  .event-title.done-text { text-decoration: line-through; color: #aaa; }
  .todo-cat-section { margin-bottom: 12px; }
  .todo-cat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 4px 4px; border-bottom: 1.5px solid #e5e7eb; margin-bottom: 4px;
  }
  .todo-cat-name { font-size: 12px; font-weight: 700; color: #374151; letter-spacing: 0.3px; }
  .todo-cat-add-btn {
    background: none; border: none; cursor: pointer; font-size: 18px;
    color: #9CA3AF; line-height: 1; padding: 0 2px; transition: color 0.15s;
  }
  .todo-item { display: flex; align-items: center; gap: 8px; padding: 5px 4px; border-radius: 6px; transition: background 0.1s; }
  .todo-item:hover { background: #F9FAFB; }
  .todo-item-title { flex: 1; font-size: 13px; color: #1F2937; cursor: pointer; padding: 1px 0; }
  .todo-del-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: #D1D5DB; padding: 0 2px; line-height: 1; transition: color 0.15s; }
  .todo-del-btn:hover { color: #EF4444; }
  .todo-filter-bar {
    display: flex; gap: 5px; padding: 8px 0 6px; flex-wrap: wrap; align-items: center;
    background: #fff; position: sticky; top: 0; z-index: 1;
  }
  .todo-filter-btn {
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
    border: 1.5px solid #ccc; background: #fff; color: #888; cursor: pointer; transition: all 0.15s;
  }
  .todo-filter-btn.active { background: #111; border-color: #111; color: #fff; }

  /* Scope toggle in header area */
  .scope-toggle {
    display: flex; border: 1.5px solid #e5e5e5; border-radius: 8px; overflow: hidden;
  }
  .scope-btn {
    padding: 4px 12px; border: none; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap;
  }
  .scope-btn.active { background: #111; color: #fff; }
  .scope-btn:not(.active) { background: #fff; color: #888; }

  /* List view */
  .list-view { flex: 1; overflow-y: auto; padding: 0 16px; }
  .list-date-header { font-size: 12px; font-weight: 700; color: #888; padding: 12px 0 6px; letter-spacing: 0.5px; text-transform: uppercase; }

  /* Ideas view */
  .ideas-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .ideas-filters { display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto; border-bottom: 1px solid #f0f0f0; scrollbar-width: none; }
  .ideas-filters::-webkit-scrollbar { display: none; }
  .filter-chip { flex-shrink: 0; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1.5px solid transparent; transition: all 0.15s; white-space: nowrap; }
  .filter-chip.active { color: #fff; }
  .ideas-list { flex: 1; overflow-y: auto; padding: 8px 16px 80px; }
  .idea-card { border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px 40px 12px 12px; margin-bottom: 10px; position: relative; cursor: pointer; transition: background 0.1s; }
  .idea-card:hover { background: #fafafa; }
  .idea-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .idea-category-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; color: #fff; flex-shrink: 0; }
  .idea-source { font-size: 12px; color: #888; }
  .idea-card-title { font-size: 13px; line-height: 1.4; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .idea-delete { position: absolute; top: 8px; right: 8px; background: none; border: none; cursor: pointer; font-size: 14px; color: #ccc; z-index: 1; }

  /* Chat view */
  .chat-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .chat-msg { display: flex; gap: 8px; align-items: flex-end; }
  .chat-msg.mine { flex-direction: row-reverse; }
  .chat-avatar { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .chat-content { max-width: 72%; }
  .chat-name { font-size: 11px; color: #888; margin-bottom: 3px; }
  .chat-msg.mine .chat-name { text-align: right; }
  .chat-bubble { padding: 8px 12px; border-radius: 16px; font-size: 13px; line-height: 1.5; word-break: break-word; }
  .chat-msg:not(.mine) .chat-bubble { background: #f0f0f0; color: #111; border-bottom-left-radius: 4px; }
  .chat-msg.mine .chat-bubble { background: #111; color: #fff; border-bottom-right-radius: 4px; }
  .chat-time { font-size: 10px; color: #bbb; margin-top: 3px; }
  .chat-msg.mine .chat-time { text-align: right; }
  .chat-input-area { padding: 10px 16px 20px; border-top: 1px solid #f0f0f0; display: flex; gap: 8px; align-items: center; background: #fff; }
  .chat-input { flex: 1; padding: 9px 14px; border: 1.5px solid #e5e5e5; border-radius: 22px; font-size: 14px; outline: none; font-family: inherit; transition: border-color 0.15s; }
  .chat-input:focus { border-color: #111; }
  .chat-send-btn { width: 38px; height: 38px; border-radius: 50%; background: #111; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; flex-shrink: 0; transition: background 0.15s; }
  .chat-send-btn:hover { background: #333; }
  .chat-date-divider { text-align: center; font-size: 11px; color: #bbb; margin: 4px 0; }
  .chat-empty { text-align: center; font-size: 13px; color: #bbb; padding: 40px 0; }

  /* Admin panel */
  .pending-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
  .pending-name { flex: 1; font-size: 14px; }
  .approve-btn { padding: 5px 14px; border-radius: 8px; border: none; background: #10B981; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; }

  /* FAB */
  .fab {
    position: fixed; bottom: 24px; right: calc(50% - 228px);
    width: 52px; height: 52px; border-radius: 50%;
    background: #111; color: #fff; font-size: 28px;
    border: none; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; transition: transform 0.15s;
  }
  .fab:hover { transform: scale(1.06); }
  @media (max-width: 480px) { .fab { right: 20px; } }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 200; }
  .modal-overlay.hidden { display: none; }
  .modal { width: 100%; max-width: 480px; background: #fff; border-radius: 20px 20px 0 0; padding: 24px 20px 32px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; display: block; }
  .form-input { width: 100%; padding: 10px 12px; border: 1.5px solid #e5e5e5; border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; transition: border-color 0.15s; }
  .form-input:focus { border-color: #111; }
  .type-selector { display: flex; gap: 8px; flex-wrap: wrap; }
  .type-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid #e5e5e5; font-size: 13px; cursor: pointer; background: #fff; transition: all 0.15s; font-family: inherit; }
  .type-btn.active { border-color: #111; background: #111; color: #fff; }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
  .btn { flex: 1; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .btn-primary { background: #111; color: #fff; }
  .btn-primary:hover { background: #333; }
  .btn-secondary { background: #f0f0f0; color: #444; }
  .type-choice { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .type-choice-btn { padding: 14px 16px; border: 1.5px solid #e5e5e5; border-radius: 10px; background: #fff; cursor: pointer; text-align: left; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; transition: all 0.15s; font-family: inherit; }
  .type-choice-btn:hover { border-color: #111; background: #fafafa; }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

  /* Login / Pending screens */
  .full-screen {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #fff; z-index: 1000; padding: 40px 20px; text-align: center;
  }
</style>
</head>
<body>

<!-- ── Login Screen ── -->
<div id="loginScreen" class="full-screen">
  <div style="font-size:56px;margin-bottom:20px">📌</div>
  <div style="font-size:22px;font-weight:700;margin-bottom:8px">피크마케팅 캘린더</div>
  <div style="font-size:14px;color:#888;margin-bottom:48px;line-height:1.7">팀과 함께 일정을 관리하세요</div>
  <button onclick="signInWithGoogle()" style="display:flex;align-items:center;gap:10px;padding:14px 28px;border:1.5px solid #e5e5e5;border-radius:12px;background:#fff;cursor:pointer;font-size:15px;font-weight:600;font-family:inherit;transition:all 0.15s" onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background='#fff'">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    구글로 로그인
  </button>
</div>

<!-- ── Pending Screen ── -->
<div id="pendingScreen" class="full-screen" style="display:none">
  <div style="font-size:56px;margin-bottom:20px">⏳</div>
  <div style="font-size:20px;font-weight:700;margin-bottom:12px">승인 대기 중</div>
  <div style="font-size:14px;color:#888;line-height:1.8;margin-bottom:36px">관리자에게 접근 권한을 요청하세요.<br>승인 후 새로고침하면 이용 가능합니다.</div>
  <button onclick="doSignOut()" style="padding:10px 28px;border:1.5px solid #e5e5e5;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;font-family:inherit">로그아웃</button>
</div>

<!-- ── Main App ── -->
<div class="app" id="appScreen" style="display:none">
  <header>
    <div class="header-left">
      <div class="header-title">📌 피크마케팅</div>
    </div>
    <div class="header-right">
      <div class="header-nav" id="calNav" style="display:none">
        <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
        <span class="month-label" id="monthLabel"></span>
        <button class="nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div id="userAvatar" class="user-avatar" onclick="toggleUserMenu()">👤</div>
    </div>
  </header>

  <!-- User menu -->
  <div id="userMenu" style="display:none;position:fixed;top:54px;right:calc(50% - 228px);background:#fff;border:1px solid #e5e5e5;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:150;min-width:180px;padding:8px 0">
    <div id="userMenuName" style="padding:10px 16px;font-size:13px;font-weight:600;border-bottom:1px solid #f0f0f0"></div>
    <div id="adminMenuItems" style="display:none">
      <div onclick="openAdminPanel()" style="padding:10px 16px;font-size:13px;cursor:pointer;color:#111" onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background='#fff'">👥 팀 관리</div>
    </div>
    <div onclick="doSignOut()" style="padding:10px 16px;font-size:13px;cursor:pointer;color:#EF4444" onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background='#fff'">로그아웃</div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('calendar')">📅 월별</div>
    <div class="tab" onclick="switchTab('list')">≡ 목록</div>
    <div class="tab" onclick="switchTab('ideas')">💡 아이디어</div>
    <div class="tab" onclick="switchTab('chat')">💬 채팅</div>
  </div>

  <!-- Scope toggle (calendar + list) -->
  <div id="scopeBar" style="padding:8px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px">
    <div class="scope-toggle">
      <button class="scope-btn active" id="scopePersonalTab" onclick="setViewScope('personal')">🔒 내 일정</button>
      <button class="scope-btn" id="scopeTeamTab" onclick="setViewScope('team')">👥 팀 일정</button>
      <button class="scope-btn" id="scopeAllTab" onclick="setViewScope('all')">전체</button>
    </div>
  </div>

  <!-- Calendar View -->
  <div id="calendarView">
    <div class="calendar-grid" id="calendarGrid"></div>
    <div class="day-detail" id="dayDetail">
      <div class="day-detail-title" id="dayDetailTitle"></div>
      <div id="dayEventsList"></div>
    </div>
  </div>

  <!-- List View -->
  <div id="listView" class="list-view" style="display:none"></div>

  <!-- Ideas View -->
  <div id="ideasView" class="ideas-view" style="display:none">
    <div class="ideas-filters" id="ideasFilters"></div>
    <div class="ideas-list" id="ideasList"></div>
  </div>

  <!-- Chat View -->
  <div id="chatView" class="chat-view" style="display:none">
    <div class="chat-messages" id="chatMessages">
      <div class="chat-empty">팀 채팅을 시작하세요! 💬</div>
    </div>
    <div class="chat-input-area">
      <input class="chat-input" id="chatInput" placeholder="메시지 입력..." maxlength="500"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}" />
      <button class="chat-send-btn" onclick="sendChat()">↑</button>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="openAddModal()" style="display:none">+</button>

<!-- Type Choice Modal -->
<div class="modal-overlay hidden" id="typeChoiceModal">
  <div class="modal">
    <div class="modal-title">무엇을 추가할까요?</div>
    <div class="type-choice">
      <button class="type-choice-btn" onclick="openEventModal()">📅 일정 / 할 일 / 링크 / 메모</button>
      <button class="type-choice-btn" onclick="openIdeaModal()">💡 아이디어</button>
    </div>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn btn-secondary" onclick="closeTypeChoice()">취소</button>
    </div>
  </div>
</div>

<!-- Event Modal -->
<div class="modal-overlay hidden" id="eventModal">
  <div class="modal">
    <div class="modal-title" id="eventModalTitle">일정 추가</div>
    <div class="form-group">
      <label class="form-label">공개 범위</label>
      <div class="scope-toggle" style="width:fit-content">
        <button class="scope-btn active" id="evScopePersonal" onclick="selectEvScope('personal')">🔒 내 일정</button>
        <button class="scope-btn" id="evScopeTeam" onclick="selectEvScope('team')">👥 팀 일정</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">종류</label>
      <div class="type-selector">
        <button class="type-btn active" data-type="meeting" onclick="selectEventType(this)">📅 미팅</button>
        <button class="type-btn" data-type="todo" onclick="selectEventType(this)">✅ 할 일</button>

// ── Auth ────────────────────────────────────────────────────
function signInWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(err => alert('로그인 실패: ' + err.message));
}
function doSignOut() {
  auth.signOut();
  unsubAll();
}
function unsubAll() {
  if (unsubscribeEvents) { unsubscribeEvents(); unsubscribeEvents = null; }
  if (unsubscribeIdeas)  { unsubscribeIdeas();  unsubscribeIdeas  = null; }
  if (unsubscribeChat)   { unsubscribeChat();   unsubscribeChat   = null; }
}

auth.onAuthStateChanged(async user => {
  if (!user) { showScreen('login'); events = []; ideas = []; return; }
  currentUser = user;

  try {
    const userRef = db.collection('users').doc(user.uid);
    let userSnap = await userRef.get();

    if (!userSnap.exists) {
      await userRef.set({
        email: user.email, name: user.displayName,
        photoURL: user.photoURL || '',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        approved: false, role: 'member'
      });
      userSnap = await userRef.get();
    }
    currentUserDoc = userSnap.data();

    // First ever user → auto-approve as admin
    if (!currentUserDoc.approved) {
      try {
        const approvedSnap = await db.collection('users')
          .where('approved', '==', true).limit(1).get();
        if (approvedSnap.empty) {
          await userRef.update({ approved: true, role: 'admin' });
          currentUserDoc = (await userRef.get()).data();
        }
      } catch (e) {
        // Firestore rules may block query for new user — try direct update
        await userRef.update({ approved: true, role: 'admin' });
        currentUserDoc = (await userRef.get()).data();
      }
    }

    if (!currentUserDoc.approved) { showScreen('pending'); return; }
    isAdmin = currentUserDoc.role === 'admin';
    showScreen('app');
    initApp();

  } catch (err) {
    console.error('Auth error:', err);
    alert('오류: ' + err.message + '\n\nFirestore 규칙을 다시 적용해주세요.');
    doSignOut();
  }
});

function showScreen(screen) {
  document.getElementById('loginScreen').style.display   = screen === 'login'   ? 'flex' : 'none';

  document.getElementById('appScreen').style.display     = screen === 'app'     ? ''     : 'none';
  document.getElementById('fab').style.display           = screen === 'app'     ? ''     : 'none';
  if (screen !== 'app') unsubAll();
}

// ── Init ────────────────────────────────────────────────────
function initApp() {
  // Avatar
  const av = document.getElementById('userAvatar');

// ── Firestore subscriptions ─────────────────────────────────
function subscribeEvents() {
  if (unsubscribeEvents) unsubscribeEvents();
  const uid = currentUser.uid;

  if (isAdmin) {
    // 어드민 — 전체 열람
    unsubscribeEvents = db.collection('events')
      .onSnapshot(snap => {
        events = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(e => !e.deleted);
        renderCalendar();
        if (currentTab === 'list') renderList();
      }, err => console.error('admin events:', err));
    return;
  }

  let personalEvs = [], teamEvs = [];
  const merge = () => {
    const map = {};
    [...personalEvs, ...teamEvs].forEach(e => map[e.id] = e);
    events = Object.values(map).filter(e => !e.deleted);
    renderCalendar();
    if (currentTab === 'list') renderList();
  };
  const unsubP = db.collection('events').where('ownerId', '==', uid)
    .onSnapshot(snap => { personalEvs = snap.docs.map(d => ({ id: d.id, ...d.data() })); merge(); }, err => console.error('personal events:', err));
  const unsubT = db.collection('events').where('scope', '==', 'team')
    .onSnapshot(snap => { teamEvs = snap.docs.map(d => ({ id: d.id, ...d.data() })); merge(); }, err => console.error('team events:', err));
  unsubscribeEvents = () => { unsubP(); unsubT(); };
}

function subscribeIdeas() {
  if (unsubscribeIdeas) unsubscribeIdeas();
  const uid = currentUser.uid;

  const sortIdeas = arr => arr.sort((a,b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));

  if (isAdmin) {
    // 어드민 — 전체 열람
    unsubscribeIdeas = db.collection('ideas')
      .onSnapshot(snap => {
        ideas = sortIdeas(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        if (ideas.length === 0) seedDefaultIdeas();
        if (currentTab === 'ideas') renderIdeas();
      }, err => console.error('admin ideas:', err));
    return;
  }

  let personalIdeas = [], teamIdeas = [];
  const merge = () => {
    const map = {};
    [...personalIdeas, ...teamIdeas].forEach(i => map[i.id] = i);
    ideas = sortIdeas(Object.values(map));
    if (ideas.length === 0) seedDefaultIdeas();
    if (currentTab === 'ideas') renderIdeas();
  };
  const unsubP = db.collection('ideas').where('ownerId', '==', uid)
    .onSnapshot(snap => { personalIdeas = snap.docs.map(d => ({ id: d.id, ...d.data() })); merge(); }, err => console.error('personal ideas:', err));
  const unsubT = db.collection('ideas').where('scope', '==', 'team')
    .onSnapshot(snap => { teamIdeas = snap.docs.map(d => ({ id: d.id, ...d.data() })); merge(); }, err => console.error('team ideas:', err));
  unsubscribeIdeas = () => { unsubP(); unsubT(); };
}

async function seedDefaultIdeas() {
  const batch = db.batch();
  DEFAULT_IDEAS.forEach(d => {
    const ref = db.collection('ideas').doc();
    batch.set(ref, { ...d, scope: 'personal', ownerId: currentUser.uid, ownerName: currentUser.displayName, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
  });
  await batch.commit();
}

function subscribeChat() {
  if (unsubscribeChat) unsubscribeChat();

    .orderBy('createdAt', 'asc')
    .limitToLast(100)
    .onSnapshot(snap => {
      renderChatMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    }, err => console.error('chat:', err));
}

// ── Utilities ───────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toDateStr(y, m, d) { return y + '-' + String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0'); }
function todayStr() { const t = new Date(); return toDateStr(t.getFullYear(), t.getMonth()+1, t.getDate()); }
function formatDateHeader(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  const dow = new Date(y,m-1,d).getDay();
  return `${m}월 ${d}일 (${'일월화수목금토'[dow]})`;
}
function formatTime(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: true });
}

// ── Calendar ─────────────────────────────────────────────────
function renderCalendar() {
  const grid  = document.getElementById('calendarGrid');
  const label = document.getElementById('monthLabel');
  label.textContent = `${currentYear}.${String(currentMonth).padStart(2,'0')}`;
  const days = ['일','월','화','수','목','금','토'];
  const firstDay = new Date(currentYear, currentMonth-1, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  const prevDays = new Date(currentYear, currentMonth-1, 0).getDate();
  const today = todayStr();
  let html = days.map(d => `<div class="weekday-label">${d}</div>`).join('');
  for (let i = firstDay-1; i >= 0; i--) {
    const day = prevDays - i;
    const pm = currentMonth === 1 ? 12 : currentMonth-1;
    const py = currentMonth === 1 ? currentYear-1 : currentYear;
    html += dayCell(day, toDateStr(py,pm,day), true, today);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dow = (firstDay + d - 1) % 7;
    const extra = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';
    html += dayCell(d, toDateStr(currentYear, currentMonth, d), false, today, extra);
  }
  const remaining = 7 - ((firstDay + daysInMonth) % 7);
  if (remaining < 7) for (let d = 1; d <= remaining; d++) {
    const nm = currentMonth === 12 ? 1 : currentMonth+1;
    const ny = currentMonth === 12 ? currentYear+1 : currentYear;
    html += dayCell(d, toDateStr(ny,nm,d), true, today);
  }
  grid.innerHTML = html;
  renderDayDetail(selectedDate);
}

function dayCell(day, ds, otherMonth, today, extra='') {
  const isToday = ds === today, isSelected = ds === selectedDate;
  const evs = filteredEvents().filter(e => e.date === ds);
  const dots = evs.slice(0,3).map(e => `<div class="event-dot" style="background:${EVENT_TYPES[e.type]?.color||'#888'}"></div>`).join('');
  const cls = ['day-cell', extra, isToday?'today':'', isSelected?'selected':'', otherMonth?'other-month':''].filter(Boolean).join(' ');
  return `<div class="${cls}" onclick="selectDay('${ds}')"><div class="day-num">${day}</div><div class="event-dots">${dots}</div></div>`;
}

function selectDay(ds) { selectedDate = ds; renderCalendar(); }
function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
  renderCalendar();
}

function renderDayDetail(ds) {
  const title = document.getElementById('dayDetailTitle');
  const list  = document.getElementById('dayEventsList');
  if (!ds) { title.textContent = '날짜를 선택하세요'; list.innerHTML = ''; return; }
  title.textContent = formatDateHeader(ds);
  let evs = filteredEvents().filter(e => e.date === ds).sort((a,b) => (a.time||'').localeCompare(b.time||''));
  let html = todoFilterBarHTML();
  const nonTodos = evs.filter(e => e.type !== 'todo');
  if (nonTodos.length) html += nonTodos.map(e => eventItemHTML(e)).join('');
  DEFAULT_TODO_CATS.forEach(cat => {
    let catTodos = evs.filter(e => e.type === 'todo' && (e.todoCat||'개인할일') === cat);
    if (todoStatusFilter === '완료')   catTodos = catTodos.filter(e => e.done);
    if (todoStatusFilter === '미완료') catTodos = catTodos.filter(e => !e.done);
    const catColor = CAT_COLORS[cat] || '#6B7280';
    html += `<div class="todo-cat-section">
      <div class="todo-cat-header">
        <span class="todo-cat-name" style="color:${catColor}"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${catColor};margin-right:5px;vertical-align:middle"></span>${escHtml(cat)}</span>
        <button class="todo-cat-add-btn" style="color:${catColor}" onclick="addTodoToCategory('${ds}','${escHtml(cat)}')">+</button>
      </div>
      <div class="todo-cat-items">${catTodos.map(e => todoItemHTML(e)).join('')}</div>
    </div>`;
  });
  list.innerHTML = html;
}

function todoItemHTML(e) {
  const isDone = e.done;
  const canEdit = e.ownerId === currentUser.uid;
  return `<div class="todo-item" id="todo-${e.id}">
    <div class="todo-checkbox ${isDone?'done':''}" onclick="toggleTodo('${e.id}')"></div>
    <div class="todo-item-title" style="${isDone?'text-decoration:line-through;opacity:0.45;':''}" onclick="${canEdit?`editTodoInline('${e.id}')`:''}">${escHtml(e.title)}${e.scope==='team'?'<span class="team-badge">팀</span>':''}</div>
    ${canEdit ? `<button class="todo-del-btn" onclick="deleteEvent('${e.id}')">×</button>` : ''}
  </div>`;
}

function eventItemHTML(e) {
  const t = EVENT_TYPES[e.type] || EVENT_TYPES.meeting;
  const isDone = e.done;
  const canEdit = e.ownerId === currentUser.uid;
  const checkbox = e.type === 'todo' ? `<div class="todo-checkbox ${isDone?'done':''}" onclick="toggleTodo('${e.id}')"></div>` : '';
  const titleClass = isDone ? 'event-title done-text' : 'event-title';
  const teamBadge = e.scope === 'team' ? '<span class="team-badge">팀</span>' : '';
  const ownerLabel = (e.scope === 'team' && e.ownerName && e.ownerId !== currentUser.uid)
    ? `<div class="owner-label">👤 ${escHtml(e.ownerName)}</div>` : '';
  const timeStr = e.time ? `<div class="event-time">${e.time}</div>` : '';
  const urlStr  = e.url  ? `<a href="${escHtml(e.url)}" target="_blank" rel="noopener" class="event-time" style="color:#3b82f6">🔗 ${escHtml(e.url)}</a>` : '';
  const memoStr = e.memo ? `<div class="event-time">${escHtml(e.memo)}</div>` : '';
  return `<div class="event-item">
    ${checkbox}
    <div class="event-color-bar" style="background:${t.color}"></div>
    <div class="event-body" ${canEdit?`onclick="editEvent('${e.id}')" style="cursor:pointer"`:''}>
      <div class="${titleClass}">${t.icon} ${escHtml(e.title)}${teamBadge}</div>
      ${timeStr}${ownerLabel}${urlStr}${memoStr}
    </div>
    ${canEdit ? `<div class="event-actions"><button class="icon-btn" onclick="event.stopPropagation();deleteEvent('${e.id}')">🗑</button></div>` : ''}
  </div>`;
}

async function addTodoToCategory(ds, cat) {
  const title = prompt(cat + '에 할 일 추가:');
  if (!title || !title.trim()) return;
  await db.collection('events').add({
    type: 'todo', title: title.trim(), date: ds, todoCat: cat,
    scope: viewScope === 'team' ? 'team' : 'personal',
    ownerId: currentUser.uid, ownerName: currentUser.displayName,
    done: false, deleted: false, createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}

async function editTodoInline(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  const newTitle = prompt('할 일 수정:', ev.title);
  if (newTitle === null || !newTitle.trim()) return;
  await db.collection('events').doc(id).update({ title: newTitle.trim() });
}

async function toggleTodo(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  await db.collection('events').doc(id).update({ done: !ev.done });
}

async function deleteEvent(id) {
  if (!confirm('삭제할까요?')) return;
  await db.collection('events').doc(id).update({ deleted: true });
}

// ── List view ─────────────────────────────────────────────────
function renderList() {
  const container = document.getElementById('listView');
  let filtered = filteredEvents();
  if (todoStatusFilter === '완료')   filtered = filtered.filter(e => e.type !== 'todo' || e.done);
  if (todoStatusFilter === '미완료') filtered = filtered.filter(e => e.type !== 'todo' || !e.done);
  if (!filtered.length) { container.innerHTML = todoFilterBarHTML() + '<div class="no-events" style="padding:40px 0">일정 없음</div>'; return; }
  const sorted = [...filtered].sort((a,b) => a.date.localeCompare(b.date) || (a.time||'').localeCompare(b.time||''));
  const groups = {};
  sorted.forEach(e => (groups[e.date] = groups[e.date] || []).push(e));
  container.innerHTML = todoFilterBarHTML() + Object.entries(groups).map(([ds, evs]) =>
    `<div class="list-date-group"><div class="list-date-header">${formatDateHeader(ds)}</div>${evs.map(e => eventItemHTML(e)).join('')}</div>`
  ).join('');
}

function todoFilterBarHTML() {
  return `<div class="todo-filter-bar">${[['all','전체'],['미완료','미완료'],['완료','완료']].map(([v,l]) =>
    `<button class="todo-filter-btn ${todoStatusFilter===v?'active':''}" onclick="setTodoStatusFilter('${v}')">${l}</button>`
  ).join('')}</div>`;
}
function setTodoStatusFilter(f) {
  todoStatusFilter = f;
  if (currentTab === 'calendar') renderCalendar();
  else if (currentTab === 'list') renderList();
}

// ── Ideas view ────────────────────────────────────────────────
function renderIdeasFilters() {
  const container = document.getElementById('ideasFilters');
  const cats = ['all', ...Object.keys(IDEA_CATS)];
  container.innerHTML = cats.map(cat => {
    const color = cat === 'all' ? '#111' : IDEA_CATS[cat].color;
    const isActive = activeIdeaCat === cat;
    return `<div class="filter-chip ${isActive?'active':''}" style="${isActive?`background:${color};border-color:${color};color:#fff`:`border-color:${color};color:${color}`}" onclick="filterIdeas('${cat}')">${cat === 'all' ? '전체' : cat}</div>`;
  }).join('');
}
function filterIdeas(cat) { activeIdeaCat = cat; renderIdeas(); }
function renderIdeas() {
  renderIdeasFilters();
  const filtered = activeIdeaCat === 'all' ? ideas : ideas.filter(i => i.category === activeIdeaCat);
  const container = document.getElementById('ideasList');
  if (!filtered.length) { container.innerHTML = '<div class="no-events" style="padding:40px 0">아이디어 없음</div>'; return; }
  container.innerHTML = filtered.map(idea => {
    const cat = IDEA_CATS[idea.category] || { color: '#888' };
    return `<div class="idea-card" onclick="openIdeaDetail('${idea.id}')">
      <div class="idea-card-header">
        <span class="idea-category-badge" style="background:${cat.color}">${escHtml(idea.category)}</span>
        <span class="idea-source">${escHtml(idea.source||'')}</span>
      </div>
      <div class="idea-card-title">${escHtml(idea.summary)}</div>
      <button class="idea-delete" onclick="event.stopPropagation();deleteIdea('${idea.id}')">✕</button>
    </div>`;
  }).join('');
}

async function deleteIdea(id) {
  if (!confirm('삭제할까요?')) return;
  await db.collection('ideas').doc(id).delete();
}

function openIdeaDetail(id) {
  const idea = ideas.find(i => String(i.id) === String(id));
  if (!idea) return;
  const cat = IDEA_CATS[idea.category] || { color: '#999' };
  const canDel = idea.ownerId === currentUser.uid || isAdmin;
  let h = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <span style="background:${cat.color};color:#fff;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600">${escHtml(idea.category)}</span>
    <button onclick="closeIdeaDetail()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#999;padding:4px">✕</button>
  </div>`;
  h += `<div style="font-size:13px;color:#888;margin-bottom:12px">${escHtml(idea.source||'')}</div>`;
  h += `<div style="font-size:15px;line-height:1.8;color:#222;margin-bottom:16px;white-space:pre-wrap">${escHtml(idea.summary||'')}</div>`;
  if (idea.url) h += `<a href="${escHtml(idea.url)}" target="_blank" rel="noopener" style="display:block;padding:12px 14px;background:#F3F4F6;border-radius:10px;color:#3B82F6;text-decoration:none;font-size:13px;word-break:break-all;margin-bottom:12px">🔗 ${escHtml(idea.url)}</a>`;
  const dateLabel = idea.date || (idea.createdAt ? (idea.createdAt.toDate ? idea.createdAt.toDate().toLocaleDateString('ko-KR') : '') : '');
  if (dateLabel) h += `<div style="font-size:12px;color:#bbb;text-align:right">${dateLabel}</div>`;
  if (canDel) h += `<div style="margin-top:16px;display:flex;gap:8px">
    <button onclick="deleteIdea('${idea.id}');closeIdeaDetail()" style="flex:1;padding:10px;border-radius:8px;border:1.5px solid #f3f4f6;background:#fff;color:#EF4444;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">삭제</button>
    <button onclick="closeIdeaDetail()" style="flex:2;padding:10px;border-radius:8px;border:none;background:#111;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">닫기</button>
  </div>`;
  document.getElementById('ideaDetailContent').innerHTML = h;
  document.getElementById('ideaDetailOverlay').style.display = 'flex';
}
function closeIdeaDetail() { document.getElementById('ideaDetailOverlay').style.display = 'none'; }

// ── Chat ──────────────────────────────────────────────────────
async function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  await db.collection('chat').add({
    text, uid: currentUser.uid,
    name: currentUser.displayName || currentUser.email,
    photoURL: currentUser.photoURL || '',
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}

function renderChatMessages(msgs) {
  const container = document.getElementById('chatMessages');
  if (!msgs.length) { container.innerHTML = '<div class="chat-empty">팀 채팅을 시작하세요! 💬</div>'; return; }
  let lastDate = '';
  container.innerHTML = msgs.map(msg => {
    const isMine = msg.uid === currentUser.uid;
    const ts = msg.createdAt ? msg.createdAt.toDate() : new Date();
    const dateStr = ts.toLocaleDateString('ko-KR');
    let divider = '';
    if (dateStr !== lastDate) { divider = `<div class="chat-date-divider">${dateStr}</div>`; lastDate = dateStr; }
    const avatar = msg.photoURL
      ? `<img src="${escHtml(msg.photoURL)}" referrerpolicy="no-referrer">`
      : (msg.name||'?')[0];
    const timeStr = ts.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', hour12:true });
    return `${divider}<div class="chat-msg ${isMine?'mine':''}">
      <div class="chat-avatar">${avatar}</div>
      <div class="chat-content">
        ${!isMine ? `<div class="chat-name">${escHtml(msg.name||'')}</div>` : ''}
        <div class="chat-bubble">${escHtml(msg.text)}</div>
        <div class="chat-time">${timeStr}</div>
      </div>
    </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

// ── Modal helpers ─────────────────────────────────────────────
function openAddModal() { document.getElementById('typeChoiceModal').classList.remove('hidden'); }
function closeTypeChoice() { document.getElementById('typeChoiceModal').classList.add('hidden'); }

function openEventModal() {
  closeTypeChoice();
  editingEventId = null; selectedEventType = 'meeting'; evScope = 'personal';
  document.getElementById('eventModalTitle').textContent = '일정 추가';
  document.getElementById('eventTitle').value = '';
  document.getElementById('eventDate').value  = selectedDate || todayStr();
  document.getElementById('eventTime').value  = '';
  document.getElementById('eventUrl').value   = '';
  document.getElementById('eventMemo').value  = '';
  document.getElementById('eventReminder').value = '';
  document.getElementById('eventUrlGroup').style.display  = 'none';
  document.getElementById('todoCatGroup').style.display   = 'none';
  document.getElementById('reminderGroup').style.display  = 'none';
  document.querySelectorAll('.type-btn[data-type]').forEach(b => b.classList.toggle('active', b.dataset.type === 'meeting'));
  document.querySelectorAll('.type-btn[data-cat]').forEach(b => b.classList.toggle('active', b.dataset.cat === '피크마케팅'));
  selectEvScope('personal');
  document.getElementById('eventModal').classList.remove('hidden');
}
function closeEventModal() { document.getElementById('eventModal').classList.add('hidden'); }

function selectEvScope(s) {
  evScope = s;
  document.getElementById('evScopePersonal').classList.toggle('active', s === 'personal');
  document.getElementById('evScopeTeam').classList.toggle('active', s === 'team');
}

function selectEventType(btn) {
  selectedEventType = btn.dataset.type;
  document.querySelectorAll('.type-btn[data-type]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('eventUrlGroup').style.display  = selectedEventType === 'link' ? '' : 'none';
  document.getElementById('todoCatGroup').style.display   = selectedEventType === 'todo' ? '' : 'none';
  document.getElementById('reminderGroup').style.display  = selectedEventType === 'todo' ? '' : 'none';
}
function selectTodoCat(btn) {
  selectedTodoCat = btn.dataset.cat;
  document.querySelectorAll('.type-btn[data-cat]').forEach(b => b.classList.toggle('active', b.dataset.cat === selectedTodoCat));
}

function editEvent(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  editingEventId = id; selectedEventType = ev.type;
  selectedTodoCat = ev.todoCat || '피크마케팅';
  document.getElementById('eventModalTitle').textContent = '일정 수정';
  document.getElementById('eventTitle').value  = ev.title;
  document.getElementById('eventDate').value   = ev.date;
  document.getElementById('eventTime').value   = ev.time  || '';
  document.getElementById('eventUrl').value    = ev.url   || '';
  document.getElementById('eventMemo').value   = ev.memo  || '';
  document.getElementById('eventReminder').value = ev.reminder || '';
  document.getElementById('eventUrlGroup').style.display  = ev.type === 'link' ? '' : 'none';
  document.getElementById('todoCatGroup').style.display   = ev.type === 'todo' ? '' : 'none';
  document.getElementById('reminderGroup').style.display  = ev.type === 'todo' ? '' : 'none';
  document.querySelectorAll('.type-btn[data-type]').forEach(b => b.classList.toggle('active', b.dataset.type === ev.type));
  document.querySelectorAll('.type-btn[data-cat]').forEach(b => b.classList.toggle('active', b.dataset.cat === selectedTodoCat));
  selectEvScope(ev.scope || 'personal');
  document.getElementById('eventModal').classList.remove('hidden');
}

async function saveEvent() {
  const title = document.getElementById('eventTitle').value.trim();
  const date  = document.getElementById('eventDate').value;
  if (!title || !date) { alert('제목과 날짜를 입력하세요'); return; }
  const reminder = selectedEventType === 'todo' ? document.getElementById('eventReminder').value : null;
  const data = {
    type: selectedEventType, title, date,
    time: document.getElementById('eventTime').value,
    url:  document.getElementById('eventUrl').value.trim(),
    memo: document.getElementById('eventMemo').value.trim(),
    todoCat: selectedEventType === 'todo' ? selectedTodoCat : null,
    reminder: reminder || null,
    scope: evScope,
    ownerId: currentUser.uid,
    ownerName: currentUser.displayName || currentUser.email,
    deleted: false,
  };
  if (editingEventId) {
    const prev = events.find(e => e.id === editingEventId);
    await db.collection('events').doc(editingEventId).update({ ...data, done: prev?.done || false });
  } else {
    data.done = false;
    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    await db.collection('events').add(data);
  }
  if (reminder) scheduleReminder({ ...data, id: editingEventId || 'new' });
  closeEventModal();
  selectedDate = date;
}

function openIdeaModal() {
  closeTypeChoice(); selectedIdeaCat = 'AI도구'; selectedIdeaScope = 'personal';
  document.querySelectorAll('#ideaCategorySelector .type-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === 'AI도구'));
  document.getElementById('ideaSource').value  = '';
  document.getElementById('ideaUrl').value     = '';
  document.getElementById('ideaSummary').value = '';
  selectIdeaScope('personal');
  document.getElementById('ideaModal').classList.remove('hidden');
}
function closeIdeaModal() { document.getElementById('ideaModal').classList.add('hidden'); }
function selectIdeaCat(btn) {
  selectedIdeaCat = btn.dataset.cat;
  document.querySelectorAll('#ideaCategorySelector .type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function selectIdeaScope(s) {
  selectedIdeaScope = s;
  document.getElementById('ideaScopePersonal').classList.toggle('active', s === 'personal');
  document.getElementById('ideaScopeTeam').classList.toggle('active', s === 'team');
}
async function saveIdea() {
  const summary = document.getElementById('ideaSummary').value.trim();
  if (!summary) { alert('요약을 입력하세요'); return; }
  await db.collection('ideas').add({
    category: selectedIdeaCat,
    source:   document.getElementById('ideaSource').value.trim(),
    url:      document.getElementById('ideaUrl').value.trim(),
    summary,
    scope: selectedIdeaScope,
    ownerId: currentUser.uid,
    ownerName: currentUser.displayName || currentUser.email,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  closeIdeaModal();
}

// ── Admin panel ───────────────────────────────────────────────
function toggleUserMenu() {
  const m = document.getElementById('userMenu');
  m.style.display = m.style.display === 'none' ? '' : 'none';
}
document.addEventListener('click', e => {
  if (!document.getElementById('userAvatar').contains(e.target) && !document.getElementById('userMenu').contains(e.target))
    document.getElementById('userMenu').style.display = 'none';
});

async function openAdminPanel() {
  document.getElementById('userMenu').style.display = 'none';
  document.getElementById('adminModal').classList.remove('hidden');
  // Pending users
  const pendingSnap = await db.collection('users').where('approved', '==', false).get();
  const pl = document.getElementById('pendingList');
  if (pendingSnap.empty) { pl.innerHTML = '<div style="font-size:13px;color:#aaa;padding:12px 0">대기 중인 사용자 없음</div>'; }
  else pl.innerHTML = pendingSnap.docs.map(d => {
    const u = d.data();
    return `<div class="pending-item">
      <div class="pending-name">${escHtml(u.name||u.email)}<div style="font-size:11px;color:#888">${escHtml(u.email)}</div></div>
      <button class="approve-btn" onclick="approveUser('${d.id}')">승인</button>
    </div>`;
  }).join('');
  // Approved users
  const approvedSnap = await db.collection('users').where('approved', '==', true).get();
  document.getElementById('approvedList').innerHTML = approvedSnap.docs.map(d => {
    const u = d.data();
    return `<div class="pending-item">
      <div class="pending-name">${escHtml(u.name||u.email)}<div style="font-size:11px;color:#888">${escHtml(u.email)} ${u.role==='admin'?'👑':''}</div></div>
    </div>`;
  }).join('');
}
async function approveUser(uid) {
  await db.collection('users').doc(uid).update({ approved: true });
  openAdminPanel();
}
function closeAdminPanel() { document.getElementById('adminModal').classList.add('hidden'); }

async function claimAllIdeas() {
  if (!confirm('기존 아이디어 전체를 내 소유(나만 보기)로 변경할까요?\n(되돌릴 수 없어요)')) return;
  const snap = await db.collection('ideas').get();
  const batch = db.batch();
  snap.docs.forEach(d => {
    batch.update(d.ref, {
      ownerId: currentUser.uid,
      ownerName: currentUser.displayName || currentUser.email,
      scope: 'personal'
    });
  });
  await batch.commit();
  alert('완료! 아이디어 전체가 내 소유(나만 보기)로 변경됐어요.');
}

// ── Reminders ─────────────────────────────────────────────────
function requestNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
}
function scheduleReminder(ev) {
  if (!ev.reminder || ev.done) return;
  const ms = new Date(ev.reminder).getTime() - Date.now();
  if (ms <= 0 || ms > 7 * 86400000) return;
  setTimeout(() => {
    if (Notification.permission === 'granted')
      new Notification('⏰ ' + ev.title, { body: ev.reminder.replace('T',' ').slice(0,16) });
  }, ms);
}

// ── Modal overlay click to close ──────────────────────────────
['typeChoiceModal','eventModal','ideaModal','adminModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) this.classList.add('hidden');
  });
});
