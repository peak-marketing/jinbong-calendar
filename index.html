<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진봉 × Claude</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #fff;
    color: #111;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #fff;
  }

  /* Notification bar */
  .notif-bar {
    background: #FFFBEB; padding: 8px 16px; font-size: 12px; color: #92400E;
    display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #FDE68A;
    flex-wrap: wrap;
  }
  .notif-bar span { flex: 1; }
  .notif-allow {
    padding: 3px 10px; border-radius: 6px; border: none; cursor: pointer;
    font-size: 11px; font-weight: 600; background: #F59E0B; color: #fff;
  }
  .notif-later {
    padding: 3px 10px; border-radius: 6px; border: none; cursor: pointer;
    font-size: 11px; font-weight: 600; background: #E5E7EB; color: #6B7280;
  }

  /* Header */
  header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid #e5e5e5;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .header-nav { display: flex; align-items: center; gap: 8px; }
  .nav-btn {
    background: none; border: none; cursor: pointer;
    font-size: 18px; color: #555; padding: 4px;
    line-height: 1;
  }
  .month-label { font-size: 15px; font-weight: 600; min-width: 80px; text-align: center; }

  /* Tabs */
  .tabs {
    display: flex;
    border-bottom: 1px solid #e5e5e5;
    background: #fff;
  }
  .tab {
    flex: 1; padding: 12px 8px; text-align: center;
    font-size: 13px; font-weight: 500; color: #888;
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab.active { color: #111; border-bottom-color: #111; }

  /* Calendar view */
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 0 4px;
  }
  .weekday-label {
    text-align: center; font-size: 11px; font-weight: 600;
    color: #888; padding: 10px 0 6px;
  }
  .weekday-label:first-child { color: #ef4444; }
  .weekday-label:last-child { color: #3b82f6; }
  .day-cell {
    aspect-ratio: 1; display: flex; flex-direction: column;
    align-items: center; padding: 4px 2px; cursor: pointer;
    border-radius: 8px; transition: background 0.1s;
    position: relative;
  }
  .day-cell:hover { background: #f5f5f5; }
  .day-cell.other-month .day-num { color: #ccc; }
  .day-cell.today .day-num {
    background: #111; color: #fff;
    border-radius: 50%; width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
  }
  .day-cell.selected { background: #f0f0f0; }
  .day-num {
    font-size: 13px; font-weight: 500; line-height: 24px;
    width: 24px; height: 24px; text-align: center;
  }
  .day-cell:first-child .day-num, .day-cell.sun .day-num { color: #ef4444; }
  .day-cell:last-child .day-num, .day-cell.sat .day-num { color: #3b82f6; }
  .day-cell.today .day-num { color: #fff !important; }
  .event-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; margin-top: 2px; }
  .event-dot { width: 5px; height: 5px; border-radius: 50%; }

  /* Day detail */
  .day-detail {
    border-top: 1px solid #e5e5e5;
    padding: 12px 16px;
    flex: 1;
    overflow-y: auto;
  }
  .day-detail-title { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 8px; }
  .no-events { font-size: 13px; color: #aaa; text-align: center; padding: 20px 0; }

  /* Event items */
  .event-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid #f0f0f0;
  }
  .event-item:last-child { border-bottom: none; }
  .event-color-bar { width: 3px; border-radius: 2px; align-self: stretch; min-height: 20px; flex-shrink: 0; }
  .event-body { flex: 1; min-width: 0; }
  .event-type-icon { font-size: 12px; margin-right: 4px; }
  .event-title { font-size: 14px; font-weight: 500; word-break: break-word; }
  .event-time { font-size: 11px; color: #888; margin-top: 2px; }
  .event-alarm-badge { font-size: 10px; color: #F59E0B; margin-left: 4px; }
  .event-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .icon-btn {
    background: none; border: none; cursor: pointer;
    font-size: 14px; color: #aaa; padding: 2px;
  }
  .icon-btn:hover { color: #555; }
  .todo-checkbox {
    width: 18px; height: 18px; border-radius: 4px;
    border: 2px solid #ccc; cursor: pointer; flex-shrink: 0;
    margin-top: 2px; background: #fff;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .todo-checkbox.done { background: #10B981; border-color: #10B981; }
  .todo-checkbox.done::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }
  .event-title.done-text { text-decoration: line-through; color: #aaa; }
  .todo-cat-badge {
    display: inline-block; padding: 1px 7px; border-radius: 10px;
    font-size: 10px; font-weight: 600; color: #fff; margin-left: 5px;
    vertical-align: middle;
  }
  .todo-cat-section {
    margin-bottom: 12px;
  }
  .todo-cat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 4px 4px; border-bottom: 1.5px solid #e5e7eb; margin-bottom: 4px;
  }
  .todo-cat-name {
    font-size: 12px; font-weight: 700; color: #374151; letter-spacing: 0.3px;
  }
  .todo-cat-add-btn {
    background: none; border: none; cursor: pointer; font-size: 18px;
    color: #9CA3AF; line-height: 1; padding: 0 2px;
    transition: color 0.15s;
  }
  .todo-cat-add-btn:hover { color: #10B981; }
  .todo-cat-items { padding: 2px 0; }
  .todo-item {
    display: flex; align-items: center; gap: 8px; padding: 5px 4px;
    border-radius: 6px; transition: background 0.1s;
  }
  .todo-item:hover { background: #F9FAFB; }
  .todo-item-title {
    flex: 1; font-size: 13px; color: #1F2937; cursor: pointer;
    padding: 1px 0;
  }
  .todo-del-btn {
    background: none; border: none; cursor: pointer; font-size: 16px;
    color: #D1D5DB; padding: 0 2px; line-height: 1;
    transition: color 0.15s;
  }
  .todo-del-btn:hover { color: #EF4444; }
  .todo-filter-bar {
    display: flex; gap: 5px; padding: 8px 0 6px; flex-wrap: wrap; align-items: center;
    background: #fff; position: sticky; top: 0; z-index: 1;
  }
  .todo-filter-btn {
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
    border: 1.5px solid #ccc; background: #fff; color: #888; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .todo-filter-btn.active { background: #111; border-color: #111; color: #fff; }

  /* List view */
  .list-view { flex: 1; overflow-y: auto; padding: 0 16px; }
  .list-date-group { margin-bottom: 4px; }
  .list-date-header {
    font-size: 12px; font-weight: 700; color: #888;
    padding: 12px 0 6px; letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* Ideas view */
  .ideas-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .ideas-filters {
    display: flex; gap: 6px; padding: 10px 16px;
    overflow-x: auto; border-bottom: 1px solid #f0f0f0;
    scrollbar-width: none;
  }
  .ideas-filters::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0; padding: 4px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    border: 1.5px solid transparent; transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-chip.active { color: #fff; }
  .ideas-list { flex: 1; overflow-y: auto; padding: 8px 16px 80px; }
  .idea-card {
    border: 1px solid #e5e5e5; border-radius: 10px;
    padding: 12px 40px 12px 12px; margin-bottom: 10px;
    position: relative; cursor: pointer; transition: background 0.1s;
  }
  .idea-card:hover { background: #fafafa; }
  .idea-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .idea-category-badge {
    font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 10px; color: #fff; flex-shrink: 0;
  }
  .idea-source { font-size: 12px; color: #888; }
  .idea-card-title {
    font-size: 13px; line-height: 1.4; color: #222;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .idea-delete {
    position: absolute; top: 8px; right: 8px;
    background: none; border: none; cursor: pointer;
    font-size: 14px; color: #ccc; z-index: 1;
  }
  .idea-delete:hover { color: #888; }

  /* Idea detail sections */
  .idea-detail-section { margin-bottom: 14px; }
  .idea-detail-label {
    font-size: 10px; font-weight: 700; color: #9CA3AF; letter-spacing: 0.8px;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .idea-detail-topic {
    font-size: 17px; font-weight: 700; color: #111; line-height: 1.4;
  }
  .idea-detail-key {
    font-size: 14px; line-height: 1.65; color: #1F2937; font-weight: 500;
    white-space: pre-wrap;
  }
  .idea-detail-body {
    font-size: 13px; line-height: 1.7; color: #6B7280;
    white-space: pre-wrap;
  }
  .idea-detail-source { font-size: 13px; color: #888; }
  .idea-detail-url {
    display: block; padding: 10px 14px; background: #F3F4F6; border-radius: 10px;
    color: #3B82F6; text-decoration: none; font-size: 13px;
    word-break: break-all; margin-bottom: 10px;
  }
  .idea-detail-url:hover { background: #E5E7EB; }
  .idea-detail-date { font-size: 12px; color: #bbb; text-align: right; margin-top: 8px; }

  /* FAB */
  .fab {
    position: fixed; bottom: 24px; right: calc(50% - 228px);
    width: 52px; height: 52px; border-radius: 50%;
    background: #111; color: #fff; font-size: 28px;
    border: none; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; transition: transform 0.15s;
  }
  .fab:hover { transform: scale(1.06); }
  @media (max-width: 480px) {
    .fab { right: 20px; }
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 200;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    width: 100%; max-width: 480px; background: #fff;
    border-radius: 20px 20px 0 0; padding: 24px 20px 32px;
    max-height: 85vh; overflow-y: auto;
  }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; padding: 10px 12px; border: 1.5px solid #e5e5e5;
    border-radius: 8px; font-size: 14px; outline: none;
    font-family: inherit; transition: border-color 0.15s;
  }
  .form-input:focus { border-color: #111; }
  .type-selector { display: flex; gap: 8px; flex-wrap: wrap; }
  .type-btn {
    padding: 6px 14px; border-radius: 20px; border: 1.5px solid #e5e5e5;
    font-size: 13px; cursor: pointer; background: #fff; transition: all 0.15s;
  }
  .type-btn.active { border-color: #111; background: #111; color: #fff; }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
  .btn {
    flex: 1; padding: 12px; border-radius: 10px; font-size: 15px;
    font-weight: 600; border: none; cursor: pointer; transition: all 0.15s;
  }
  .btn-primary { background: #111; color: #fff; }
  .btn-primary:hover { background: #333; }
  .btn-secondary { background: #f0f0f0; color: #444; }
  .btn-secondary:hover { background: #e5e5e5; }

  /* Type choice modal */
  .type-choice { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .type-choice-btn {
    padding: 14px 16px; border: 1.5px solid #e5e5e5; border-radius: 10px;
    background: #fff; cursor: pointer; text-align: left;
    font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px;
    transition: all 0.15s;
  }
  .type-choice-btn:hover { border-color: #111; background: #fafafa; }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Notification permission bar -->
  <div id="notifBar" class="notif-bar" style="display:none">
    <span>🔔 할 일·일정 알림을 받으려면 알림을 허용해주세요</span>
    <button class="notif-allow" onclick="requestNotifPermission()">허용</button>
    <button class="notif-later" onclick="hideNotifBar()">나중에</button>
  </div>

  <header>
    <div class="header-title">진봉 × Claude</div>
    <div class="header-nav" id="calNav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="monthLabel"></span>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('calendar')">📅 월별</div>
    <div class="tab" onclick="switchTab('list')">≡ 목록</div>
    <div class="tab" onclick="switchTab('ideas')">💡 아이디어</div>
  </div>

  <!-- Calendar View -->
  <div id="calendarView">
    <div class="calendar-grid" id="calendarGrid"></div>
    <div class="day-detail" id="dayDetail">
      <div class="day-detail-title" id="dayDetailTitle"></div>
      <div id="dayEventsList"></div>
    </div>
  </div>

  <!-- List View -->
  <div id="listView" class="list-view" style="display:none"></div>

  <!-- Ideas View -->
  <div id="ideasView" class="ideas-view" style="display:none">
    <div class="ideas-filters" id="ideasFilters"></div>
    <div class="ideas-list" id="ideasList"></div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="openAddModal()">+</button>

<!-- Type Choice Modal -->
<div class="modal-overlay hidden" id="typeChoiceModal">
  <div class="modal">
    <div class="modal-title">무엇을 추가할까요?</div>
    <div class="type-choice">
      <button class="type-choice-btn" onclick="openEventModal()">📅 일정 / 할 일 / 링크 / 메모</button>
      <button class="type-choice-btn" onclick="openIdeaModal()">💡 아이디어</button>
    </div>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn btn-secondary" onclick="closeTypeChoice()">취소</button>
    </div>
  </div>
</div>

<!-- Event Modal -->
<div class="modal-overlay hidden" id="eventModal">
  <div class="modal">
    <div class="modal-title" id="eventModalTitle">일정 추가</div>
    <div class="form-group">
      <label class="form-label">종류</label>
      <div class="type-selector">
        <button class="type-btn active" data-type="meeting" onclick="selectEventType(this)">📅 미팅</button>
        <button class="type-btn" data-type="todo" onclick="selectEventType(this)">✅ 할 일</button>
        <button class="type-btn" data-type="link" onclick="selectEventType(this)">🔗 링크</button>
        <button class="type-btn" data-type="memo" onclick="selectEventType(this)">📝 메모</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">제목</label>
      <input class="form-input" id="eventTitle" placeholder="제목 입력" />
    </div>
    <div class="form-group" id="eventDateGroup">
      <label class="form-label">날짜</label>
      <input class="form-input" type="date" id="eventDate" />
    </div>
    <div class="form-group" id="eventTimeGroup">
      <label class="form-label">시간 (선택)</label>
      <input class="form-input" type="time" id="eventTime" />
    </div>
    <div class="form-group" id="eventUrlGroup" style="display:none">
      <label class="form-label">URL</label>
      <input class="form-input" id="eventUrl" placeholder="https://" />
    </div>
    <div class="form-group">
      <label class="form-label">메모 (선택)</label>
      <textarea class="form-input" id="eventMemo" rows="2" placeholder="내용 입력" style="resize:none"></textarea>
    </div>
    <div class="form-group" id="todoCatGroup" style="display:none">
      <label class="form-label">카테고리</label>
      <div class="type-selector" id="todoCatSelector"></div>
    </div>
    <div class="form-group">
      <label class="form-label">🔔 알림 시간 (선택)</label>
      <input class="form-input" type="datetime-local" id="eventAlarm" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeEventModal()">취소</button>
      <button class="btn btn-primary" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<!-- Idea Modal -->
<div class="modal-overlay hidden" id="ideaModal">
  <div class="modal">
    <div class="modal-title">아이디어 추가</div>
    <div class="form-group">
      <label class="form-label">카테고리</label>
      <div class="type-selector" id="ideaCategorySelector">
        <button class="type-btn active" data-cat="AI도구" onclick="selectIdeaCat(this)">AI도구</button>
        <button class="type-btn" data-cat="영상제작" onclick="selectIdeaCat(this)">영상제작</button>
        <button class="type-btn" data-cat="수익화" onclick="selectIdeaCat(this)">수익화</button>
        <button class="type-btn" data-cat="자산구조" onclick="selectIdeaCat(this)">자산구조</button>
        <button class="type-btn" data-cat="미래전망" onclick="selectIdeaCat(this)">미래전망</button>
        <button class="type-btn" data-cat="콘텐츠" onclick="selectIdeaCat(this)">콘텐츠</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">주제</label>
      <input class="form-input" id="ideaTopic" placeholder="핵심 주제 한 줄" />
    </div>
    <div class="form-group">
      <label class="form-label">출처</label>
      <input class="form-input" id="ideaSource" placeholder="@계정명 또는 출처" />
    </div>
    <div class="form-group">
      <label class="form-label">URL (선택)</label>
      <input class="form-input" id="ideaUrl" placeholder="https://" />
    </div>
    <div class="form-group">
      <label class="form-label">핵심요약</label>
      <textarea class="form-input" id="ideaKeySummary" rows="2" placeholder="핵심 포인트" style="resize:none"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">상세요약 (선택)</label>
      <textarea class="form-input" id="ideaDetailSummary" rows="3" placeholder="상세 내용" style="resize:none"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeIdeaModal()">취소</button>
      <button class="btn btn-primary" onclick="saveIdea()">저장</button>
    </div>
  </div>
</div>

<!-- Todo Edit Modal -->
<div class="modal-overlay hidden" id="todoEditModal">
  <div class="modal">
    <div class="modal-title">할 일 수정</div>
    <div class="form-group">
      <label class="form-label">할 일</label>
      <input class="form-input" id="todoEditTitle" placeholder="할 일 입력" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeTodoEdit()">취소</button>
      <button class="btn btn-primary" onclick="saveTodoEdit()">저장</button>
    </div>
  </div>
</div>

<!-- Idea Detail Overlay -->
<div id="ideaDetailOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)" onclick="this.style.display='none'">
  <div id="ideaDetailContent" style="background:#fff;border-radius:16px;padding:24px;max-width:420px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);animation:modalIn 0.2s ease" onclick="event.stopPropagation()"></div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────
const EVENTS_KEY = 'jinbong-claude-calendar';
const IDEAS_KEY  = 'jinbong-claude-ideas';
const TODO_CATS_KEY = 'jinbong-todo-cats';
const DEFAULT_TODO_CATS = ['피크마케팅', '운동', '개인할일'];

// ── Storage ────────────────────────────────────────────────
function loadData() {
  const ev = localStorage.getItem(EVENTS_KEY);
  events = ev ? JSON.parse(ev) : [];
  const savedCats = localStorage.getItem(TODO_CATS_KEY);
  window.todoCats = savedCats ? JSON.parse(savedCats) : [...DEFAULT_TODO_CATS];
  const id = localStorage.getItem(IDEAS_KEY);
  if (id) {
    ideas = JSON.parse(id);
    if (ideas.length > 0 && ideas.every(i => !i.url)) {
      ideas = DEFAULT_IDEAS.map((d, i) => ({ ...d, id: 'default_' + i, createdAt: Date.now() - i * 1000 }));
      saveIdeas();
    }
  } else {
    ideas = DEFAULT_IDEAS.map((d, i) => ({ ...d, id: 'default_' + i, createdAt: Date.now() - i * 1000 }));
    saveIdeas();
  }
}
function saveEvents() { localStorage.setItem(EVENTS_KEY, JSON.stringify(events)); }
function saveIdeas()  { localStorage.setItem(IDEAS_KEY,  JSON.stringify(ideas));  }

// ── Utilities ──────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function toDateStr(y, m, d) {
  return y + '-' + String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0');
}
function formatDateHeader(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const days = ['일','월','화','수','목','금','토'];
  const dow = new Date(y, m-1, d).getDay();
  return `${m}월 ${d}일 (${days[dow]})`;
}
function todayStr() {
  const t = new Date();
  return toDateStr(t.getFullYear(), t.getMonth()+1, t.getDate());
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getCatColor(cat) {
  const cats = window.todoCats || DEFAULT_TODO_CATS;
  const idx = cats.indexOf(cat);
  if (idx >= 0) return CAT_COLOR_PALETTE[idx % CAT_COLOR_PALETTE.length];
  return '#6B7280';
}

// ── Notification system ────────────────────────────────────
function initNotifications() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    document.getElementById('notifBar').style.display = 'flex';
  } else if (Notification.permission === 'granted') {
    scheduleAllAlarms();
  }
}

function requestNotifPermission() {
  Notification.requestPermission().then(perm => {
    hideNotifBar();
    if (perm === 'granted') scheduleAllAlarms();
  });
}

function hideNotifBar() {
  document.getElementById('notifBar').style.display = 'none';
}

function scheduleAllAlarms() {
  events.forEach(ev => { if (ev.alarmAt) scheduleAlarm(ev); });
}

function scheduleAlarm(ev) {
  if (!ev.alarmAt || Notification.permission !== 'granted') return;
  const alarmTime = new Date(ev.alarmAt).getTime();
  const delay = alarmTime - Date.now();
  if (delay > 0 && delay < 24 * 60 * 60 * 1000) {
    setTimeout(() => {
      new Notification('🔔 ' + ev.title, {
        body: ev.memo || (EVENT_TYPES[ev.type] ? EVENT_TYPES[ev.type].label : '알림'),
      });
    }, delay);
  }
}

// ── Tab switching ──────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((el, i) => {
    const tabs = ['calendar','list','ideas'];
    el.classList.toggle('active', tabs[i] === tab);
  });
  document.getElementById('calendarView').style.display = tab === 'calendar' ? '' : 'none';
  document.getElementById('listView').style.display     = tab === 'list'     ? '' : 'none';
  document.getElementById('ideasView').style.display    = tab === 'ideas'    ? '' : 'none';
  document.getElementById('calNav').style.display       = tab === 'calendar' ? '' : 'none';
  if (tab === 'list')   renderList();
  if (tab === 'ideas')  renderIdeas();
}

// ── Calendar rendering ─────────────────────────────────────
function renderCalendar() {
  const grid = document.getElementById('calendarGrid');
  const label = document.getElementById('monthLabel');
  label.textContent = `${currentYear}년 ${currentMonth}월`;

  const days = ['일','월','화','수','목','금','토'];
  const firstDay = new Date(currentYear, currentMonth-1, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  const prevDays = new Date(currentYear, currentMonth-1, 0).getDate();
  const today = todayStr();

  let html = days.map(d => `<div class="weekday-label">${d}</div>`).join('');

  for (let i = firstDay - 1; i >= 0; i--) {
    const day = prevDays - i;
    const pm = currentMonth === 1 ? 12 : currentMonth - 1;
    const py = currentMonth === 1 ? currentYear - 1 : currentYear;
    const ds = toDateStr(py, pm, day);
    html += dayCell(day, ds, today, 'other-month');
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = toDateStr(currentYear, currentMonth, d);
    const dow = (firstDay + d - 1) % 7;
    const extra = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';
    html += dayCell(d, ds, today, extra);
  }
  const total = firstDay + daysInMonth;
  const remaining = 7 - (total % 7);
  if (remaining < 7) {
    for (let d = 1; d <= remaining; d++) {
      const nm = currentMonth === 12 ? 1 : currentMonth + 1;
      const ny = currentMonth === 12 ? currentYear + 1 : currentYear;
      const ds = toDateStr(ny, nm, d);
      html += dayCell(d, ds, today, 'other-month');
    }
  }

  grid.innerHTML = html;
  renderDayDetail(selectedDate);
}

function dayCell(day, ds, today, extra) {
  const isToday = ds === today;
  const isSelected = ds === selectedDate;
  const evs = events.filter(e => e.date === ds);
  const dots = evs.slice(0,3).map(e =>
    `<div class="event-dot" style="background:${EVENT_TYPES[e.type]?.color || '#888'}"></div>`
  ).join('');
  const classes = ['day-cell', extra, isToday ? 'today' : '', isSelected ? 'selected' : ''].filter(Boolean).join(' ');
  return `<div class="${classes}" onclick="selectDay('${ds}')">
    <div class="day-num">${day}</div>
    <div class="event-dots">${dots}</div>
  </div>`;
}

function selectDay(ds) {
  selectedDate = ds;
  renderCalendar();
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
  renderCalendar();
}

function renderDayDetail(ds) {
  const title = document.getElementById('dayDetailTitle');
  const list  = document.getElementById('dayEventsList');
  if (!ds) { title.textContent = '날짜를 선택하세요'; list.innerHTML = ''; return; }
  title.textContent = formatDateHeader(ds);
  let evs = events.filter(e => e.date === ds);
  evs = evs.sort((a,b) => (a.time||'').localeCompare(b.time||''));

  const nonTodos = evs.filter(e => e.type !== 'todo');
  const cats = window.todoCats || DEFAULT_TODO_CATS;

  let html = todoFilterBarHTML();

  if (nonTodos.length) {
    html += nonTodos.map(e => eventItemHTML(e)).join('');
  }

  cats.forEach(cat => {
    let catTodos = evs.filter(e => e.type === 'todo' && (e.todoCat || e.category || '개인할일') === cat);
    if (todoStatusFilter !== 'all')
      catTodos = catTodos.filter(e => todoStatusFilter === '완료' ? e.done : !e.done);
    const catColor = getCatColor(cat);
    html += `<div class="todo-cat-section">
      <div class="todo-cat-header">
        <span class="todo-cat-name" style="color:${catColor}"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${catColor};margin-right:5px;vertical-align:middle;"></span>${escHtml(cat)}</span>
        <button class="todo-cat-add-btn" style="color:${catColor}" onclick="addTodoToCategory('${ds}','${escHtml(cat)}')">+</button>
      </div>
      <div class="todo-cat-items">
        ${catTodos.map(e => todoItemHTML(e)).join('')}
      </div>
    </div>`;
  });

  const hasSomething = nonTodos.length > 0 || cats.some(cat => {
    let t = evs.filter(e => e.type === 'todo' && (e.todoCat || e.category || '개인할일') === cat);
    if (todoStatusFilter !== 'all') t = t.filter(e => todoStatusFilter === '완료' ? e.done : !e.done);
    return t.length > 0;
  });
  if (!hasSomething) {
    html += '<div class="no-events">일정 없음</div>';
  }

  list.innerHTML = html;
}

function todoItemHTML(e) {
  const isDone = e.done;
  const titleStyle = isDone ? 'text-decoration:line-through;opacity:0.45;' : '';
  const alarmBadge = e.alarmAt ? '<span class="event-alarm-badge">🔔</span>' : '';
  return `<div class="todo-item" id="todo-${e.id}">
    <div class="todo-checkbox ${isDone ? 'done' : ''}" onclick="toggleTodo('${e.id}')"></div>
    <div class="todo-item-title" style="${titleStyle}" onclick="openTodoEdit('${e.id}')">${escHtml(e.title)}${alarmBadge}</div>
    <button class="todo-del-btn" onclick="deleteTodo('${e.id}')">×</button>
  </div>`;
}

function addTodoToCategory(ds, cat) {
  editingTodoId = null;
  document.getElementById('todoEditTitle').value = '';
  document.getElementById('todoEditModal').dataset.date = ds;
  document.getElementById('todoEditModal').dataset.cat = cat;
  document.getElementById('todoEditModal').querySelector('.modal-title').textContent = cat + ' 할 일 추가';
  document.getElementById('todoEditModal').classList.remove('hidden');
}

function openTodoEdit(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  editingTodoId = id;
  document.getElementById('todoEditTitle').value = ev.title;
  document.getElementById('todoEditModal').querySelector('.modal-title').textContent = '할 일 수정';
  document.getElementById('todoEditModal').classList.remove('hidden');
}

function closeTodoEdit() {
  editingTodoId = null;
  document.getElementById('todoEditModal').classList.add('hidden');
}

function saveTodoEdit() {
  const title = document.getElementById('todoEditTitle').value.trim();
  if (!title) { alert('할 일을 입력하세요'); return; }
  if (editingTodoId) {
    const ev = events.find(e => e.id === editingTodoId);
    if (ev) { ev.title = title; saveEvents(); renderCalendar(); renderDayDetail(selectedDate); }
  } else {
    const modal = document.getElementById('todoEditModal');
    const ds = modal.dataset.date;
    const cat = modal.dataset.cat;
    const ev = { id: uid(), type: 'todo', title, date: ds, todoCat: cat, category: cat, done: false, createdAt: Date.now() };
    events.push(ev);
    saveEvents(); renderCalendar(); renderDayDetail(ds);
  }
  closeTodoEdit();
}

function deleteTodo(id) {
  events = events.filter(e => e.id !== id);
  saveEvents(); renderCalendar(); renderDayDetail(selectedDate);
}

function eventItemHTML(e) {
  const t = EVENT_TYPES[e.type] || EVENT_TYPES.meeting;
  const isDone = e.done;
  const checkbox = e.type === 'todo'
    ? `<div class="todo-checkbox ${isDone ? 'done' : ''}" onclick="toggleTodo('${e.id}')"></div>` : '';
  const titleClass = isDone ? 'event-title done-text' : 'event-title';
  const timeStr = e.time ? `<div class="event-time">${e.time}</div>` : '';
  const urlStr = e.url ? `<a href="${escHtml(e.url)}" target="_blank" class="idea-url" style="font-size:11px;color:#3b82f6;display:block;margin-top:2px;word-break:break-all">${escHtml(e.url)}</a>` : '';
  const memoStr = e.memo ? `<div class="event-time">${escHtml(e.memo)}</div>` : '';
  const alarmBadge = e.alarmAt ? '<span class="event-alarm-badge">🔔</span>' : '';
  const catColor = e.category ? getCatColor(e.category) : '#888';
  const catBadge = (e.type === 'todo' && e.category)
    ? `<span class="todo-cat-badge" style="background:${catColor}">${escHtml(e.category)}</span>` : '';
  return `<div class="event-item">
    ${checkbox}
    <div class="event-color-bar" style="background:${t.color}"></div>
    <div class="event-body" style="cursor:pointer" onclick="editEvent('${e.id}')">
      <div class="${titleClass}">${t.icon} ${escHtml(e.title)}${catBadge}${alarmBadge}</div>
      ${timeStr}${urlStr}${memoStr}
    </div>
    <div class="event-actions">
      <button class="icon-btn" onclick="event.stopPropagation();deleteEvent('${e.id}')">🗑</button>
    </div>
  </div>`;
}

function toggleTodo(id) {
  const ev = events.find(e => e.id === id);
  if (ev) { ev.done = !ev.done; saveEvents(); renderCalendar(); if (currentTab === 'list') renderList(); renderDayDetail(selectedDate); }
}

function deleteEvent(id) {
  events = events.filter(e => e.id !== id);
  saveEvents(); renderCalendar(); if (currentTab === 'list') renderList();
}

// ── List view ──────────────────────────────────────────────
function renderList() {
  const container = document.getElementById('listView');
  let filtered = [...events];
  if (todoStatusFilter !== 'all')
    filtered = filtered.filter(e => e.type !== 'todo' || (todoStatusFilter === '완료' ? e.done : !e.done));
  if (todoCatFilter !== 'all')
    filtered = filtered.filter(e => e.type !== 'todo' || e.category === todoCatFilter);
  const fb = todoFilterBarHTML();
  if (!filtered.length) { container.innerHTML = fb + '<div class="no-events" style="padding:40px 0">일정 없음</div>'; return; }
  const sorted = [...filtered].sort((a,b) => a.date.localeCompare(b.date) || (a.time||'').localeCompare(b.time||''));
  const groups = {};
  sorted.forEach(e => { (groups[e.date] = groups[e.date] || []).push(e); });
  container.innerHTML = fb + Object.entries(groups).map(([ds, evs]) =>
    `<div class="list-date-group">
      <div class="list-date-header">${formatDateHeader(ds)}</div>
      ${evs.map(e => eventItemHTML(e)).join('')}
    </div>`
  ).join('');
}

// ── Ideas view ─────────────────────────────────────────────
function renderIdeasFilters() {
  const container = document.getElementById('ideasFilters');
  const cats = ['all', ...Object.keys(IDEA_CATS)];
  container.innerHTML = cats.map(cat => {
    const color = cat === 'all' ? '#111' : IDEA_CATS[cat].color;
    const isActive = activeIdeaCat === cat;
    const style = isActive
      ? `background:${color}; border-color:${color}; color:#fff;`
      : `border-color:${color}; color:${color};`;
    return `<div class="filter-chip ${isActive ? 'active' : ''}" style="${style}" onclick="filterIdeas('${cat}')">
      ${cat === 'all' ? '전체' : cat}
    </div>`;
  }).join('');
}

function filterIdeas(cat) {
  activeIdeaCat = cat;
  renderIdeas();
}

function renderIdeas() {
  renderIdeasFilters();
  const filtered = activeIdeaCat === 'all' ? ideas : ideas.filter(i => i.category === activeIdeaCat);
  const container = document.getElementById('ideasList');
  if (!filtered.length) { container.innerHTML = '<div class="no-events" style="padding:40px 0">아이디어 없음</div>'; return; }
  container.innerHTML = filtered.map(idea => {
    const cat = IDEA_CATS[idea.category] || { color: '#888' };
    const displayTitle = idea.topic || idea.keySummary || idea.summary || '';
    return `<div class="idea-card" onclick="openIdeaDetail('${idea.id}')">
      <div class="idea-card-header">
        <span class="idea-category-badge" style="background:${cat.color}">${escHtml(idea.category)}</span>
        <span class="idea-source">${escHtml(idea.source||'')}</span>
      </div>
      <div class="idea-card-title">${escHtml(displayTitle)}</div>
      <button class="idea-delete" onclick="event.stopPropagation();deleteIdea('${idea.id}')">✕</button>
    </div>`;
  }).join('');
}

function deleteIdea(id) {
  ideas = ideas.filter(i => i.id !== id);
  saveIdeas(); renderIdeas();
}

function openIdeaDetail(id) {
  const idea = ideas.find(i => String(i.id) === String(id));
  if (!idea) return;
  const cat = IDEA_CATS[idea.category] || { color: '#999' };

  let h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">';
  h += '<span style="background:' + cat.color + ';color:#fff;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600">' + escHtml(idea.category) + '</span>';
  h += '<button onclick="document.getElementById(\'ideaDetailOverlay\').style.display=\'none\'" style="background:none;border:none;font-size:22px;cursor:pointer;color:#999;padding:4px">✕</button>';
  h += '</div>';

  // 주제
  if (idea.topic) {
    h += '<div style="font-size:10px;font-weight:700;color:#9CA3AF;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:4px">주제</div>';
    h += '<div style="font-size:17px;font-weight:700;color:#111;line-height:1.4;margin-bottom:16px">' + escHtml(idea.topic) + '</div>';
  }

  // 출처
  if (idea.source) {
    h += '<div style="font-size:10px;font-weight:700;color:#9CA3AF;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:4px">출처</div>';
    h += '<div style="font-size:13px;color:#888;margin-bottom:16px">' + escHtml(idea.source) + '</div>';
  }

  // 핵심요약
  const keySummary = idea.keySummary || idea.summary || '';
  if (keySummary) {
    h += '<div style="font-size:10px;font-weight:700;color:#9CA3AF;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:4px">핵심요약</div>';
    h += '<div style="font-size:14px;line-height:1.65;color:#1F2937;font-weight:500;margin-bottom:16px;white-space:pre-wrap">' + escHtml(keySummary) + '</div>';
  }

  // 상세요약
  if (idea.detailSummary) {
    h += '<div style="font-size:10px;font-weight:700;color:#9CA3AF;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:4px">상세요약</div>';
    h += '<div style="font-size:13px;line-height:1.7;color:#6B7280;margin-bottom:16px;white-space:pre-wrap">' + escHtml(idea.detailSummary) + '</div>';
  }

  // URL
  if (idea.url) {
    h += '<a href="' + escHtml(idea.url) + '" target="_blank" rel="noopener" style="display:block;padding:12px 14px;background:#F3F4F6;border-radius:10px;color:#3B82F6;text-decoration:none;font-size:13px;word-break:break-all;margin-bottom:12px">🔗 ' + escHtml(idea.url) + '</a>';
  }

  // Date
  const dateStr = idea.date || (idea.createdAt ? new Date(idea.createdAt).toISOString().slice(0,10) : '');
  if (dateStr) {
    h += '<div style="font-size:12px;color:#bbb;text-align:right;margin-top:8px">' + dateStr + '</div>';
  }

  document.getElementById('ideaDetailContent').innerHTML = h;
  document.getElementById('ideaDetailOverlay').style.display = 'flex';
}

// ── Modal helpers ──────────────────────────────────────────
function openAddModal() {
  document.getElementById('typeChoiceModal').classList.remove('hidden');
}
function closeTypeChoice() {
  document.getElementById('typeChoiceModal').classList.add('hidden');
}

function buildTodoCatSelector() {
  const cats = window.todoCats || DEFAULT_TODO_CATS;
  const sel = document.getElementById('todoCatSelector');
  sel.innerHTML = cats.map((cat, idx) => {
    const color = CAT_COLOR_PALETTE[idx % CAT_COLOR_PALETTE.length];
    return `<button class="type-btn" data-cat="${escHtml(cat)}" onclick="selectTodoCat(this)" style="">${escHtml(cat)}</button>`;
  }).join('');
  // set first as active if none selected
  if (!selectedTodoCat || !cats.includes(selectedTodoCat)) selectedTodoCat = cats[0];
  sel.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === selectedTodoCat));
}

function openEventModal() {
  closeTypeChoice();
  editingEventId = null;
  selectedEventType = 'meeting';
  document.getElementById('eventModalTitle').textContent = '일정 추가';
  document.getElementById('eventTitle').value = '';
  document.getElementById('eventDate').value = selectedDate || todayStr();
  document.getElementById('eventTime').value = '';
  document.getElementById('eventUrl').value = '';
  document.getElementById('eventMemo').value = '';
  document.getElementById('eventAlarm').value = '';
  document.querySelectorAll('.type-btn[data-type]').forEach(b => b.classList.toggle('active', b.dataset.type === 'meeting'));
  document.getElementById('eventUrlGroup').style.display = 'none';
  selectedTodoCat = (window.todoCats || DEFAULT_TODO_CATS)[0] || '개인할일';
  document.getElementById('todoCatGroup').style.display = 'none';
  buildTodoCatSelector();
  document.getElementById('eventModal').classList.remove('hidden');
}
function closeEventModal() { document.getElementById('eventModal').classList.add('hidden'); }

function selectEventType(btn) {
  selectedEventType = btn.dataset.type;
  document.querySelectorAll('.type-btn[data-type]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('eventUrlGroup').style.display = selectedEventType === 'link' ? '' : 'none';
  document.getElementById('todoCatGroup').style.display = selectedEventType === 'todo' ? '' : 'none';
}

function selectTodoCat(btn) {
  selectedTodoCat = btn.dataset.cat;
  document.querySelectorAll('#todoCatSelector .type-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === selectedTodoCat));
}

function editEvent(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  editingEventId = id;
  selectedEventType = ev.type;
  selectedTodoCat = ev.category || (window.todoCats || DEFAULT_TODO_CATS)[0] || '개인할일';
  document.getElementById('eventModalTitle').textContent = '일정 수정';
  document.getElementById('eventTitle').value = ev.title;
  document.getElementById('eventDate').value = ev.date;
  document.getElementById('eventTime').value = ev.time || '';
  document.getElementById('eventUrl').value = ev.url || '';
  document.getElementById('eventMemo').value = ev.memo || '';
  document.getElementById('eventAlarm').value = ev.alarmAt || '';
  document.querySelectorAll('.type-btn[data-type]').forEach(b => b.classList.toggle('active', b.dataset.type === ev.type));
  document.getElementById('eventUrlGroup').style.display = ev.type === 'link' ? '' : 'none';
  document.getElementById('todoCatGroup').style.display = ev.type === 'todo' ? '' : 'none';
  buildTodoCatSelector();
  document.getElementById('eventModal').classList.remove('hidden');
}

function todoFilterBarHTML() {
  const statuses = [['all','전체'], ['미완료','미완료'], ['완료','완료']];
  const sBtns = statuses.map(([val, label]) => {
    const active = todoStatusFilter === val;
    return `<button class="todo-filter-btn ${active?'active':''}" onclick="setTodoStatusFilter('${val}')">${label}</button>`;
  }).join('');
  return `<div class="todo-filter-bar">${sBtns}</div>`;
}

function setTodoStatusFilter(f) {
  todoStatusFilter = f;
  if (currentTab === 'calendar') renderCalendar();
  else if (currentTab === 'list') renderList();
}
function setTodoCatFilter(cat) {
  todoCatFilter = cat;
  if (currentTab === 'calendar') renderCalendar();
  else if (currentTab === 'list') renderList();
}

function saveEvent() {
  const title = document.getElementById('eventTitle').value.trim();
  const date  = document.getElementById('eventDate').value;
  if (!title || !date) { alert('제목과 날짜를 입력하세요'); return; }
  const alarmAt = document.getElementById('eventAlarm').value || null;
  const ev = {
    id: editingEventId || uid(),
    type: selectedEventType,
    title,
    date,
    time: document.getElementById('eventTime').value,
    url:  document.getElementById('eventUrl').value.trim(),
    memo: document.getElementById('eventMemo').value.trim(),
    category: selectedEventType === 'todo' ? selectedTodoCat : null,
    todoCat: selectedEventType === 'todo' ? selectedTodoCat : null,
    alarmAt,
    done: false,
    createdAt: Date.now(),
  };
  if (editingEventId) {
    const idx = events.findIndex(e => e.id === editingEventId);
    if (idx !== -1) { ev.done = events[idx].done; events[idx] = ev; }
  } else {
    events.push(ev);
  }
  saveEvents();
  if (alarmAt) scheduleAlarm(ev);
  closeEventModal();
  selectedDate = date;
  if (currentTab === 'calendar') renderCalendar();
  else if (currentTab === 'list') renderList();
}

function openIdeaModal() {
  closeTypeChoice();
  selectedIdeaCat = 'AI도구';
  document.querySelectorAll('#ideaCategorySelector .type-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.cat === 'AI도구'));
  document.getElementById('ideaTopic').value = '';
  document.getElementById('ideaSource').value = '';
  document.getElementById('ideaUrl').value = '';
  document.getElementById('ideaKeySummary').value = '';
  document.getElementById('ideaDetailSummary').value = '';
  document.getElementById('ideaModal').classList.remove('hidden');
}
function closeIdeaModal() { document.getElementById('ideaModal').classList.add('hidden'); }

function selectIdeaCat(btn) {
  selectedIdeaCat = btn.dataset.cat;
  document.querySelectorAll('#ideaCategorySelector .type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function saveIdea() {
  const keySummary = document.getElementById('ideaKeySummary').value.trim();
  if (!keySummary) { alert('핵심요약을 입력하세요'); return; }
  const topic = document.getElementById('ideaTopic').value.trim();
  const detailSummary = document.getElementById('ideaDetailSummary').value.trim();
  ideas.unshift({
    id: uid(),
    category: selectedIdeaCat,
    topic,
    source: document.getElementById('ideaSource').value.trim(),
    url:  document.getElementById('ideaUrl').value.trim(),
    keySummary,
    detailSummary,
    summary: keySummary, // backward compat
    createdAt: Date.now(),
  });
  saveIdeas();
  closeIdeaModal();
  if (currentTab === 'ideas') renderIdeas();
}

// Close modals on overlay click
['typeChoiceModal','eventModal','ideaModal','todoEditModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) this.classList.add('hidden');
  });
});

// ── Init ───────────────────────────────────────────────────
function init() {
  loadData();
  const now = new Date();
  currentYear  = now.getFullYear();
  currentMonth = now.getMonth() + 1;
  selectedDate = todayStr();
  renderCalendar();
  initNotifications();
}

init();
</script>
